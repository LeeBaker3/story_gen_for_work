name: Frontend Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  statuses: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node version from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run frontend tests (Jest)
        env:
          CI: true
          # Ensure jest-junit writes to a predictable path for artifact upload.
          JEST_JUNIT_OUTPUT_DIR: frontend/test-results
          JEST_JUNIT_OUTPUT_NAME: junit.xml
        run: npm run test:frontend:ci

      - name: Upload Jest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-junit-report
          path: frontend/test-results/junit.xml
          if-no-files-found: ignore

      - name: Upload coverage (if configured later)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore

  legacy-status:
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Publish legacy commit status
        uses: actions/github-script@v7
        env:
          TEST_RESULT: ${{ needs.test.result }}
        with:
          script: |
            const result = process.env.TEST_RESULT;
            const state = result === 'success' ? 'success' : 'failure';
            const description = state === 'success'
              ? 'Frontend test workflow checks passed'
              : `Frontend test workflow checks did not pass (${result})`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state,
              context: 'legacy/frontend-tests',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
