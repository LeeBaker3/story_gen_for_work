name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  statuses: write

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests
        env:
          RUN_ENV: test
          MOUNT_DATA_STATIC: "true"
          OPENAI_API_KEY: "dummy-ci-key"
        run: |
          pytest -q

  legacy-status:
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: [dependency-scan, test]
    steps:
      - name: Publish legacy commit status
        uses: actions/github-script@v7
        env:
          DEPENDENCY_SCAN_RESULT: ${{ needs.dependency-scan.result }}
          TEST_RESULT: ${{ needs.test.result }}
        with:
          script: |
            const results = [
              process.env.DEPENDENCY_SCAN_RESULT,
              process.env.TEST_RESULT,
            ];
            const state = results.every((result) => result === 'success')
              ? 'success'
              : 'failure';
            const description = state === 'success'
              ? 'CI workflow checks passed'
              : `CI workflow checks did not pass (${results.join(', ')})`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state,
              context: 'legacy/ci',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
